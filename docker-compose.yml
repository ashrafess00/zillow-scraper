services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # No host port mapping: only web/celery (same Docker network) need to reach Redis.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    # Production WSGI server (not the Django dev server). --timeout is generous
    # because a cold scrape + retries can legitimately take a while.
    command: gunicorn --bind 0.0.0.0:8112 --workers 3 --timeout 120 zillow_scraper.wsgi:application
    volumes:
      - .:/app
    ports:
      - "8112:8112"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # DEBUG is controlled by .env now (set DEBUG=False on the server) — do not
      # hardcode True here, this app is internet-facing.
      # Inside compose, reach Redis via the service name (not localhost)
      - REDIS_URL=redis://redis:6379/0

  celery:
    build: .
    restart: unless-stopped
    command: celery -A zillow_scraper worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A zillow_scraper beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

volumes:
  redis_data:
